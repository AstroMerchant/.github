name: Feature Request
description: Suggest a feature for AstroMerchant
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
