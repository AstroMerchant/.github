name: Bug Report
description: Report a bug in AstroMerchant
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: input
    id: environment
    attributes:
      label: Environment
